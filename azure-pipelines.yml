trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20.x'

stages:

# ─────────────────────────────
# STAGE 1: CI - Build & Test
# ─────────────────────────────
- stage: CI
  displayName: 'CI - Build & Lint'
  jobs:
  - job: Build
    displayName: 'Install & Build'
    steps:

    - task: UseNode@1
      inputs:
        versionSpec: $(NODE_VERSION)
      displayName: 'Setup Node.js'

    - script: npm ci
      displayName: 'Install dependencies'

    - script: npm run build
      displayName: 'Build React app'

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: 'dist'
        artifactName: 'breathing-app-dist'
      displayName: 'Publish build artifacts'

# ─────────────────────────────
# STAGE 2: DEV Deploy
# ─────────────────────────────
- stage: DEV
  displayName: 'Deploy to DEV'
  dependsOn: CI
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
  jobs:
  - deployment: DeployDEV
    displayName: 'DEV Deployment'
    environment: 'DEV'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "✅ DEV deploy success - Branch develop"
            displayName: 'DEV Deploy'

# ─────────────────────────────
# STAGE 3: TEST Deploy
# ─────────────────────────────
- stage: TEST
  displayName: 'Deploy to TEST'
  dependsOn: CI
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployTEST
    displayName: 'TEST Deployment'
    environment: 'TEST'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "✅ TEST deploy success - Awaited manual approval"
            displayName: 'TEST Deploy'

# ─────────────────────────────
# STAGE 4: PROD Deploy
# ─────────────────────────────
- stage: PROD
  displayName: 'Deploy to PROD'
  dependsOn: TEST
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployPROD
    displayName: 'PROD Deployment'
    environment: 'PROD'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "✅ PROD deploy success - Production live!"
            displayName: 'PROD Deploy'